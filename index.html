<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline GUI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0f;
    --surface: #141419;
    --surface-2: #1c1c24;
    --border: #2a2a36;
    --border-active: #4a4a5a;
    --text: #e4e4ec;
    --text-dim: #7a7a8c;
    --accent: #22c55e;
    --accent-dim: #166534;
    --accent-glow: rgba(34, 197, 94, 0.12);
    --warn: #f59e0b;
    --error: #ef4444;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Layout ─────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar: Steps list ────────────── */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-header h1::before {
    content: '▸';
    font-size: 12px;
  }

  .sidebar-header p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    font-family: var(--mono);
  }

  .steps-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .step-card {
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 4px;
  }

  .step-card:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .step-card.active {
    background: var(--surface-2);
    border-color: var(--border-active);
  }

  .step-card .step-index {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .step-card .step-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .step-card .step-status {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .step-card .step-status .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .step-card .step-status .dot.running {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .step-card .step-status .dot.done { background: var(--accent); }
  .step-card .step-status .dot.error { background: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Main: Output panel ─────────────── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 64px;
  }

  .main-header .step-info h2 {
    font-size: 15px;
    font-weight: 600;
  }

  .main-header .step-info p {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .btn-run {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 24px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-run.ready {
    background: var(--accent);
    color: #000;
  }

  .btn-run.ready:hover {
    background: #2dd66b;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn-run.running {
    background: var(--surface-2);
    color: var(--warn);
    border: 1px solid var(--border);
    cursor: default;
  }

  .btn-run:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-run.paused {
    background: var(--warn);
    color: #000;
  }

  .btn-run.paused:hover {
    background: #fbbf24;
  }

  /* ── Pipeline controls ────────────── */
  .pipeline-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-pipeline {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface-2);
    color: var(--text);
  }

  .btn-pipeline:hover {
    border-color: var(--border-active);
    background: var(--surface);
  }

  .btn-pipeline.primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  .btn-pipeline.primary:hover {
    background: #2dd66b;
  }

  .btn-pipeline.warn {
    color: var(--warn);
    border-color: var(--warn);
  }

  .btn-pipeline.danger {
    color: var(--error);
    border-color: var(--error);
  }

  .btn-pipeline:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .pipeline-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 8px;
  }

  .pipeline-status.active {
    color: var(--accent);
  }

  .pipeline-status.paused {
    color: var(--warn);
  }

  /* ── Tabs ────────────────────────────── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .tab {
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 16px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── Output area ────────────────────── */
  .output-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .output-area .msg {
    margin-bottom: 4px;
    padding: 2px 0;
  }

  .msg.text { color: var(--text); }

  .msg.tool {
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 10px;
    background: var(--surface);
    border-radius: 4px;
    border-left: 2px solid var(--border-active);
    margin: 6px 0;
  }

  .msg.system {
    color: var(--accent);
    font-size: 11px;
    opacity: 0.7;
  }

  .msg.error {
    color: var(--error);
    padding: 6px 10px;
    background: rgba(239, 68, 68, 0.08);
    border-radius: 4px;
  }

  .msg.result {
    color: var(--accent);
    padding: 8px 12px;
    background: var(--accent-glow);
    border-radius: 6px;
    border: 1px solid var(--accent-dim);
    margin-top: 12px;
  }

  /* ── Source view ─────────────────────── */
  .source-view {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text-dim);
    display: none;
  }

  /* ── Empty state ─────────────────────── */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
    text-align: center;
    line-height: 1.8;
  }

  /* ── Brief Form ────────────────────────── */
  .brief-form {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: none;
  }

  .brief-form.visible { display: block; }

  .brief-form h3 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 20px;
  }

  .form-row {
    margin-bottom: 16px;
  }

  .form-row label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .form-row input,
  .form-row textarea,
  .form-row select {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-row input:focus,
  .form-row textarea:focus,
  .form-row select:focus {
    border-color: var(--accent);
  }

  .form-row textarea {
    min-height: 80px;
    resize: vertical;
    line-height: 1.5;
  }

  .form-row select {
    appearance: none;
    cursor: pointer;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .form-section h4 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
  }

  .btn-save-brief {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 24px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 20px;
  }

  .btn-save-brief:hover {
    background: #2dd66b;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .brief-saved {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-left: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .brief-saved.show { opacity: 1; }

  /* ── Scrollbar ───────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-active); }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Pipeline</h1>
      <p id="stepCount">loading…</p>
      <div class="pipeline-controls" style="margin-top: 12px;">
        <button class="btn-pipeline primary" id="pipelineRunBtn" title="Run all steps automatically">▶ Run All</button>
        <button class="btn-pipeline warn" id="pipelinePauseBtn" title="Pause after current step" style="display:none">⏸ Pause</button>
        <button class="btn-pipeline primary" id="pipelineResumeBtn" title="Resume pipeline" style="display:none">▶ Resume</button>
        <button class="btn-pipeline danger" id="pipelineStopBtn" title="Abort pipeline" style="display:none">■ Stop</button>
      </div>
      <div class="pipeline-status" id="pipelineStatus"></div>
    </div>
    <div class="steps-list" id="stepsList"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <div class="step-info">
        <h2 id="activeTitle">Select a step</h2>
        <p id="activeFile">—</p>
      </div>
      <button class="btn-run ready" id="runBtn" disabled>▶ Run</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="output">Output</div>
      <div class="tab" data-tab="source">Source</div>
    </div>

    <div class="output-area" id="outputArea">
      <div class="empty-state">select a step and hit run<br>output streams here in real-time</div>
    </div>
    <div class="source-view" id="sourceView"></div>

    <!-- Brief Input Form (shown for step 00) -->
    <div class="brief-form" id="briefForm">
      <h3>Product Brief</h3>

      <div class="form-grid">
        <div class="form-row">
          <label>Content Type</label>
          <select id="bf-type">
            <option value="launch-video">Launch Video Script</option>
            <option value="twitter-thread">Twitter/X Thread</option>
            <option value="youtube-ad">YouTube Ad Script</option>
            <option value="landing-page">Landing Page Hero</option>
            <option value="product-hunt">Product Hunt Launch</option>
          </select>
        </div>
        <div class="form-row">
          <label>Length</label>
          <select id="bf-length"></select>
        </div>
      </div>

      <div class="form-section">
        <h4>About the Product</h4>
        <div class="form-row">
          <label>Brand / Product Name</label>
          <input type="text" id="bf-name" placeholder="e.g. Acme AI">
        </div>
        <div class="form-row">
          <label>What it does (1-2 sentences)</label>
          <textarea id="bf-does" rows="2" placeholder="e.g. An AI assistant that writes production-ready code from natural language"></textarea>
        </div>
        <div class="form-row">
          <label>Who it's for</label>
          <input type="text" id="bf-audience" placeholder="e.g. Solo developers and small startup teams">
        </div>
        <div class="form-row">
          <label>Key Features (one per line)</label>
          <textarea id="bf-features" rows="4" placeholder="e.g.&#10;Writes code from plain English&#10;Auto-fixes bugs&#10;Deploys in one click"></textarea>
        </div>
        <div class="form-row">
          <label>What makes it different</label>
          <textarea id="bf-diff" rows="2" placeholder="e.g. First AI that ships complete features, not just snippets"></textarea>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Tone</label>
            <select id="bf-tone">
              <option value="hype">Hype</option>
              <option value="calm authority">Calm Authority</option>
              <option value="playful">Playful</option>
              <option value="technical">Technical</option>
              <option value="aspirational">Aspirational</option>
            </select>
          </div>
        </div>
      </div>

      <button class="btn-save-brief" id="saveBriefBtn">Save Brief & Continue</button>
      <span class="brief-saved" id="briefSaved">Saved!</span>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────
  let steps = [];
  let activeStep = null;
  let isRunning = false;
  let stepStatuses = {}; // stepId → 'idle' | 'running' | 'done' | 'error'

  // Pipeline auto-run state
  let pipelineRunning = false;
  let pipelinePaused = false;
  let pipelineAborted = false;

  const stepsList = document.getElementById('stepsList');
  const outputArea = document.getElementById('outputArea');
  const sourceView = document.getElementById('sourceView');
  const runBtn = document.getElementById('runBtn');
  const activeTitle = document.getElementById('activeTitle');
  const activeFile = document.getElementById('activeFile');
  const stepCount = document.getElementById('stepCount');

  // Pipeline control elements
  const pipelineRunBtn = document.getElementById('pipelineRunBtn');
  const pipelinePauseBtn = document.getElementById('pipelinePauseBtn');
  const pipelineResumeBtn = document.getElementById('pipelineResumeBtn');
  const pipelineStopBtn = document.getElementById('pipelineStopBtn');
  const pipelineStatus = document.getElementById('pipelineStatus');

  // ── Load steps ─────────────────────────
  async function loadSteps() {
    try {
      const res = await fetch('/api/steps');
      steps = await res.json();
      stepCount.textContent = `${steps.length} steps found`;
      renderStepsList();
    } catch (err) {
      stepCount.textContent = 'error loading steps';
    }
  }

  function renderStepsList() {
    stepsList.innerHTML = steps.map((s, i) => {
      const status = stepStatuses[s.id] || 'idle';
      const isActive = activeStep?.id === s.id;
      return `
        <div class="step-card ${isActive ? 'active' : ''}" data-id="${s.id}">
          <div class="step-index">Step ${String(i + 1).padStart(2, '0')} · ${s.filename}</div>
          <div class="step-title">${esc(s.title)}</div>
          <div class="step-status">
            <span class="dot ${status}"></span>
            <span>${status}</span>
          </div>
        </div>
      `;
    }).join('');

    stepsList.querySelectorAll('.step-card').forEach(card => {
      card.addEventListener('click', () => selectStep(card.dataset.id));
    });
  }

  async function selectStep(stepId) {
    activeStep = steps.find(s => s.id === stepId);
    if (!activeStep) return;

    activeTitle.textContent = activeStep.title;
    activeFile.textContent = activeStep.filename;
    runBtn.disabled = isRunning;
    renderStepsList();

    // Show brief form for step 00, hide otherwise
    if (stepId === '00-brief' && stepStatuses[stepId] !== 'done') {
      showBriefForm();
      runBtn.style.display = 'none';
    } else {
      hideBriefForm();
      runBtn.style.display = '';
      showTab('output');
    }

    // Load source
    try {
      const res = await fetch(`/api/steps/${stepId}/content`);
      const { content } = await res.json();
      sourceView.textContent = content;
    } catch {
      sourceView.textContent = 'Could not load source';
    }
  }

  // ── Run step ───────────────────────────
  runBtn.addEventListener('click', () => {
    if (!activeStep || isRunning) return;
    runStep(activeStep.id);
  });

  function runStep(stepId) {
    return new Promise((resolve) => {
      isRunning = true;
      stepStatuses[stepId] = 'running';
      runBtn.className = 'btn-run running';
      runBtn.textContent = '⟳ Running…';
      runBtn.disabled = true;

      // Auto-select this step in the sidebar
      activeStep = steps.find(s => s.id === stepId);
      if (activeStep) {
        activeTitle.textContent = activeStep.title;
        activeFile.textContent = activeStep.filename;
        hideBriefForm();
        runBtn.style.display = '';
      }
      renderStepsList();

      outputArea.innerHTML = '';
      showTab('output');

      const es = new EventSource(`/api/run/${stepId}`);

      es.addEventListener('text', (e) => {
        const { content } = JSON.parse(e.data);
        appendOutput('text', content);
      });

      es.addEventListener('tool_call', (e) => {
        const { tool, input } = JSON.parse(e.data);
        appendOutput('tool', `⚙ ${tool}  ${input}`);
      });

      es.addEventListener('system', (e) => {
        const { sessionId } = JSON.parse(e.data);
        appendOutput('system', `session: ${sessionId}`);
      });

      es.addEventListener('status', (e) => {
        const { message } = JSON.parse(e.data);
        appendOutput('system', message);
      });

      es.addEventListener('result', (e) => {
        const { subtype, result } = JSON.parse(e.data);
        appendOutput('result', `✓ ${subtype}${result ? '\n' + result : ''}`);
      });

      es.addEventListener('error', (e) => {
        try {
          const { message } = JSON.parse(e.data);
          appendOutput('error', `✗ ${message}`);
        } catch {
          appendOutput('error', '✗ Connection error');
        }
        finish('error');
      });

      es.addEventListener('done', () => {
        finish('done');
      });

      es.onerror = () => {
        es.close();
        if (isRunning) finish('error');
      };

      function finish(status) {
        es.close();
        isRunning = false;
        stepStatuses[stepId] = status;
        runBtn.className = 'btn-run ready';
        runBtn.textContent = '▶ Run';
        runBtn.disabled = false;
        renderStepsList();
        resolve(status);
      }
    });
  }

  // ── Pipeline auto-run ────────────────────
  function updatePipelineUI() {
    if (pipelineRunning && !pipelinePaused) {
      pipelineRunBtn.style.display = 'none';
      pipelinePauseBtn.style.display = '';
      pipelineResumeBtn.style.display = 'none';
      pipelineStopBtn.style.display = '';
      runBtn.disabled = true;
    } else if (pipelineRunning && pipelinePaused) {
      pipelineRunBtn.style.display = 'none';
      pipelinePauseBtn.style.display = 'none';
      pipelineResumeBtn.style.display = '';
      pipelineStopBtn.style.display = '';
      runBtn.disabled = false;
    } else {
      pipelineRunBtn.style.display = '';
      pipelinePauseBtn.style.display = 'none';
      pipelineResumeBtn.style.display = 'none';
      pipelineStopBtn.style.display = 'none';
    }
  }

  function setPipelineStatus(text, cls) {
    pipelineStatus.textContent = text;
    pipelineStatus.className = 'pipeline-status' + (cls ? ' ' + cls : '');
  }

  async function runPipeline(startFromIndex = 0) {
    pipelineRunning = true;
    pipelinePaused = false;
    pipelineAborted = false;
    updatePipelineUI();

    for (let i = startFromIndex; i < steps.length; i++) {
      const step = steps[i];

      // Skip already-done steps
      if (stepStatuses[step.id] === 'done') {
        setPipelineStatus(`Skipping ${step.id} (done)`, 'active');
        continue;
      }

      // Check for pause
      if (pipelinePaused) {
        setPipelineStatus(`Paused before ${step.id}`, 'paused');
        updatePipelineUI();
        return; // Exit — resume will call runPipeline again
      }

      // Check for abort
      if (pipelineAborted) {
        setPipelineStatus('Pipeline stopped', '');
        pipelineRunning = false;
        updatePipelineUI();
        return;
      }

      setPipelineStatus(`Running step ${i + 1}/${steps.length}: ${step.id}`, 'active');
      const result = await runStep(step.id);

      if (result === 'error') {
        setPipelineStatus(`Pipeline stopped — ${step.id} failed`, '');
        pipelineRunning = false;
        updatePipelineUI();
        return;
      }

      // Check pause again after step completes
      if (pipelinePaused) {
        setPipelineStatus(`Paused after ${step.id}`, 'paused');
        updatePipelineUI();
        return;
      }

      if (pipelineAborted) {
        setPipelineStatus('Pipeline stopped', '');
        pipelineRunning = false;
        updatePipelineUI();
        return;
      }
    }

    setPipelineStatus('Pipeline complete', 'active');
    pipelineRunning = false;
    updatePipelineUI();
  }

  // Find next incomplete step index
  function getNextStepIndex() {
    for (let i = 0; i < steps.length; i++) {
      if (stepStatuses[steps[i].id] !== 'done') return i;
    }
    return steps.length;
  }

  pipelineRunBtn.addEventListener('click', () => {
    if (pipelineRunning || isRunning) return;

    // If step 00 brief hasn't been done yet, require it first
    if (stepStatuses['00-brief'] !== 'done') {
      selectStep('00-brief');
      setPipelineStatus('Fill in the brief first, then Run All', '');
      return;
    }

    runPipeline(getNextStepIndex());
  });

  pipelinePauseBtn.addEventListener('click', () => {
    pipelinePaused = true;
    setPipelineStatus('Pausing after current step…', 'paused');
    updatePipelineUI();
  });

  pipelineResumeBtn.addEventListener('click', () => {
    pipelinePaused = false;
    setPipelineStatus('Resuming…', 'active');
    runPipeline(getNextStepIndex());
  });

  pipelineStopBtn.addEventListener('click', async () => {
    pipelineAborted = true;
    pipelinePaused = false;
    setPipelineStatus('Stopping…', '');

    // Abort the currently running step on the server
    if (isRunning) {
      try { await fetch('/api/abort', { method: 'POST' }); } catch {}
    }

    updatePipelineUI();
  });

  function appendOutput(type, content) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = content;
    outputArea.appendChild(div);
    outputArea.scrollTop = outputArea.scrollHeight;
  }

  // ── Tabs ───────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => showTab(tab.dataset.tab));
  });

  function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    outputArea.style.display = name === 'output' ? 'block' : 'none';
    sourceView.style.display = name === 'source' ? 'block' : 'none';
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Brief Form Logic ───────────────────
  const briefForm = document.getElementById('briefForm');
  const saveBriefBtn = document.getElementById('saveBriefBtn');
  const briefSaved = document.getElementById('briefSaved');
  const bfType = document.getElementById('bf-type');
  const bfLength = document.getElementById('bf-length');

  const lengthOptions = {
    'launch-video': [['30s','30 seconds'],['60s','60 seconds'],['90s','90 seconds'],['2min','2 minutes']],
    'twitter-thread': [['5','5 tweets'],['10','10 tweets'],['15','15 tweets']],
    'youtube-ad': [['15s','15 seconds (bumper)'],['30s','30 seconds'],['60s','60 seconds']],
    'landing-page': [['short','Short'],['long','Long']],
    'product-hunt': [['standard','Standard']],
  };

  function updateLengthOptions() {
    const opts = lengthOptions[bfType.value] || [];
    bfLength.innerHTML = opts.map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
  }
  bfType.addEventListener('change', updateLengthOptions);
  updateLengthOptions();

  function showBriefForm() {
    briefForm.classList.add('visible');
    outputArea.style.display = 'none';
    sourceView.style.display = 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  }

  function hideBriefForm() {
    briefForm.classList.remove('visible');
  }

  saveBriefBtn.addEventListener('click', async () => {
    const name = document.getElementById('bf-name').value.trim();
    const does = document.getElementById('bf-does').value.trim();
    const audience = document.getElementById('bf-audience').value.trim();
    const features = document.getElementById('bf-features').value.trim();
    const diff = document.getElementById('bf-diff').value.trim();
    const tone = document.getElementById('bf-tone').value;
    const type = bfType.value;
    const length = bfLength.value;

    if (!name) { alert('Please enter a brand/product name'); return; }

    const typeLabels = {
      'launch-video': 'Launch video script',
      'twitter-thread': 'Twitter/X thread',
      'youtube-ad': 'YouTube ad script',
      'landing-page': 'Landing page hero',
      'product-hunt': 'Product Hunt launch',
    };

    const brief = `# Content Request

## What to generate
${typeLabels[type]}, ${length}

## Product Brief
- **Brand/Product Name:** ${name}
- **What it does:** ${does || '[not specified]'}
- **Who it's for:** ${audience || '[not specified]'}
- **Key features:**
${features ? features.split('\n').map(f => `  - ${f.trim()}`).join('\n') : '  - [not specified]'}
- **What makes it different:** ${diff || '[not specified]'}
- **Tone:** ${tone}
`;

    try {
      const res = await fetch('/api/brief', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: brief }),
      });
      if (!res.ok) throw new Error('Failed to save');

      briefSaved.classList.add('show');
      setTimeout(() => briefSaved.classList.remove('show'), 2000);

      // Auto-run the full pipeline starting from step 00
      hideBriefForm();
      showTab('output');
      runPipeline(0);
    } catch (err) {
      alert('Error saving brief: ' + err.message);
    }
  });

  // ── Init ───────────────────────────────
  loadSteps();
</script>

</body>
</html>
